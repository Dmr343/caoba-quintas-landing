name: Deploy a Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Caoba se sirve como sitio estático. TODO el contenido público vive en public/
      # (index + páginas legales + imágenes); worker/, migrations/, docs/, 99-archivo/
      # y credenciales quedan fuera del deploy por estar fuera de public/.
      - name: Desplegar a Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name caoba-quintas --branch main --commit-dirty=true
